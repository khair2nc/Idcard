<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>ID Card Generator System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>📇 ID Card Generator System</h2>

<!-- TYPE SELECT -->
<select id="type">
    <option value="student">Student ID</option>
    <option value="teacher">Teacher ID</option>
</select>

<!-- SEARCH -->
<input type="text" id="search" placeholder="🔎 Search Name / ID">

<div class="container">

<!-- FORM -->
<form id="form">

    <input type="text" id="name" placeholder="নাম" required>
    <input type="text" id="position" placeholder="পদবী" required>
    <input type="text" id="index" placeholder="ইনডেক্স / আইডি" required>
    <input type="text" id="subject" placeholder="বিষয়">
    <input type="text" id="join" placeholder="যোগদান তারিখ">
    <input type="text" id="expire" placeholder="মেয়াদ">
    <input type="text" id="phone" placeholder="মোবাইল">
    <input type="text" id="blood" placeholder="রক্তের গ্রুপ">

    <button type="submit">Generate ID</button>
</form>

</div>

<div id="cardContainer"></div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
